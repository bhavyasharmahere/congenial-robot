<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Class Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Tailwind Custom Configuration -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- Custom Themes and Styles -->
  <style>
    /* Theme definitions via CSS variables */
    :root {
      --bg-gradient: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
      --glow-1: rgba(79, 70, 229, 0.15); /* Indigo */
      --glow-2: rgba(6, 182, 212, 0.15); /* Cyan */
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover: rgba(255, 255, 255, 0.06);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-grad-start: #818cf8;
      --accent-grad-end: #22d3ee;
      --pill-bg: rgba(15, 23, 42, 0.6);
    }

    /* Cyberpunk Theme */
    html.theme-cyberpunk {
      --bg-gradient: radial-gradient(circle at 50% 50%, #180018 0%, #050005 100%);
      --glow-1: rgba(240, 46, 170, 0.2); /* Neon Pink */
      --glow-2: rgba(0, 240, 255, 0.15); /* Neon Cyan */
      --card-bg: rgba(255, 0, 128, 0.03);
      --card-border: rgba(240, 46, 170, 0.15);
      --card-hover: rgba(255, 0, 128, 0.07);
      --text-main: #fdf2f8;
      --text-muted: #f472b6;
      --accent-grad-start: #f43f5e;
      --accent-grad-end: #06b6d4;
      --pill-bg: rgba(5, 0, 5, 0.8);
    }

    /* Forest Glow Theme */
    html.theme-forest {
      --bg-gradient: radial-gradient(circle at 50% 50%, #022c22 0%, #01120b 100%);
      --glow-1: rgba(16, 185, 129, 0.15); /* Emerald */
      --glow-2: rgba(34, 197, 94, 0.1);  /* Green */
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-border: rgba(16, 185, 129, 0.1);
      --card-hover: rgba(16, 185, 129, 0.05);
      --text-main: #f0fdf4;
      --text-muted: #86efac;
      --accent-grad-start: #34d399;
      --accent-grad-end: #4ade80;
      --pill-bg: rgba(1, 18, 11, 0.7);
    }

    /* Frosted Glass Light Theme */
    html.theme-light {
      --bg-gradient: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
      --glow-1: rgba(99, 102, 241, 0.08); /* Indigo */
      --glow-2: rgba(6, 182, 212, 0.08);  /* Cyan */
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(0, 0, 0, 0.06);
      --card-hover: rgba(255, 255, 255, 0.9);
      --text-main: #0f172a;
      --text-muted: #475569;
      --accent-grad-start: #4f46e5;
      --accent-grad-end: #0891b2;
      --pill-bg: rgba(255, 255, 255, 0.8);
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      transition: background 0.5s ease, color 0.3s ease;
    }

    .glass-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }
    
    .glass-card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    .accent-gradient-text {
      background: linear-gradient(135deg, var(--accent-grad-start) 0%, var(--accent-grad-end) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .accent-gradient-bg {
      background: linear-gradient(135deg, var(--accent-grad-start) 0%, var(--accent-grad-end) 100%);
    }

    .dynamic-pill {
      background: var(--pill-bg);
    }

    /* Safe scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body class="min-h-screen relative overflow-x-hidden selection:bg-indigo-500/30">

  <!-- Ambient Glow Effects -->
  <div class="fixed inset-0 z-0 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full blur-[130px]" style="background-color: var(--glow-1);"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full blur-[130px]" style="background-color: var(--glow-2);"></div>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto p-4 sm:p-8">
    
    <!-- TOP NAVBAR WITH THEME SELECTION & HEADER -->
    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
      <div>
        <h1 class="text-4xl font-extrabold tracking-tight accent-gradient-text">
          Nexus Tracker
        </h1>
        <p class="opacity-80 mt-1">Manage your academic journey and backlog with premium aesthetic controls.</p>
      </div>
      
      <div class="flex flex-wrap items-center gap-4 w-full lg:w-auto">
        <!-- Theme Selector -->
        <div class="flex items-center gap-2 glass-panel px-3 py-2 rounded-xl">
          <span class="text-xs font-semibold uppercase tracking-wider opacity-60 mr-1 flex items-center gap-1">
            <i data-lucide="palette" class="w-4 h-4"></i> Theme:
          </span>
          <div class="flex gap-1">
            <button onclick="setTheme('space')" class="w-6 h-6 rounded-full bg-indigo-600 border border-white/20" title="Deep Space"></button>
            <button onclick="setTheme('cyberpunk')" class="w-6 h-6 rounded-full bg-pink-500 border border-white/20" title="Cyberpunk"></button>
            <button onclick="setTheme('forest')" class="w-6 h-6 rounded-full bg-emerald-700 border border-white/20" title="Forest Glow"></button>
            <button onclick="setTheme('light')" class="w-6 h-6 rounded-full bg-slate-200 border border-black/10" title="Glass Light"></button>
          </div>
        </div>

        <!-- Add Record Button -->
        <button 
          onclick="openAddModal()"
          class="flex items-center gap-2 px-6 py-3 bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-md rounded-xl transition-all duration-300 shadow-md hover:shadow-lg active:scale-95 ml-auto lg:ml-0"
        >
          <i data-lucide="plus" class="w-5 h-5"></i>
          <span class="font-semibold">Add Record</span>
        </button>
      </div>
    </header>

    <!-- DASHBOARD STATISTICS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      
      <!-- Card 1: Total Backlogs -->
      <div class="relative overflow-hidden glass-panel p-6 rounded-2xl shadow-xl flex justify-between items-center group">
        <div>
          <p class="text-xs font-bold uppercase tracking-wider opacity-60 mb-1">Total Backlogs</p>
          <h3 id="stat-backlogs" class="text-4xl font-black">4</h3>
        </div>
        <div class="bg-indigo-500/10 p-4 rounded-full border border-indigo-500/20 text-indigo-400 group-hover:scale-110 transition-transform">
          <i data-lucide="book-open" class="w-6 h-6"></i>
        </div>
      </div>

      <!-- Card 2: Classes Missed -->
      <div class="relative overflow-hidden glass-panel p-6 rounded-2xl shadow-xl flex justify-between items-center group">
        <div>
          <p class="text-xs font-bold uppercase tracking-wider opacity-60 mb-1">Classes Missed</p>
          <h3 id="stat-missed" class="text-4xl font-black">2</h3>
        </div>
        <div class="bg-rose-500/10 p-4 rounded-full border border-rose-500/20 text-rose-400 group-hover:scale-110 transition-transform">
          <i data-lucide="x-circle" class="w-6 h-6"></i>
        </div>
      </div>

      <!-- Card 3: Partially Completed -->
      <div class="relative overflow-hidden glass-panel p-6 rounded-2xl shadow-xl flex justify-between items-center group">
        <div>
          <p class="text-xs font-bold uppercase tracking-wider opacity-60 mb-1">Partially Completed</p>
          <h3 id="stat-partial" class="text-4xl font-black">1</h3>
        </div>
        <div class="bg-amber-500/10 p-4 rounded-full border border-amber-500/20 text-amber-400 group-hover:scale-110 transition-transform">
          <i data-lucide="alert-circle" class="w-6 h-6"></i>
        </div>
      </div>

    </div>

    <!-- MAIN VIEW CONTROLS -->
    <div class="flex flex-col lg:flex-row justify-between items-center gap-6 p-4 mb-8 glass-panel rounded-2xl">
      
      <!-- Date Navigator -->
      <div class="flex items-center gap-4">
        <button onclick="adjustDate(-1)" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <div class="flex items-center gap-3">
          <i data-lucide="calendar" class="w-5 h-5 text-indigo-400"></i>
          <span id="date-label" class="text-lg font-bold w-48 text-center select-none">
            May 2026
          </span>
        </div>
        <button onclick="adjustDate(1)" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Settings & View Options -->
      <div class="flex flex-wrap items-center gap-4 w-full lg:w-auto justify-end">
        <!-- View Mode (Week / Month) -->
        <div class="flex dynamic-pill p-1 rounded-xl border border-white/5 shadow-inner">
          <button id="btn-view-week" onclick="setViewMode('week')" class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400">
            Week
          </button>
          <button id="btn-view-month" onclick="setViewMode('month')" class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-white/15 text-white">
            Month
          </button>
        </div>

        <!-- Grouping Controls (Date / Subject) -->
        <div class="flex dynamic-pill p-1 rounded-xl border border-white/5 shadow-inner">
          <button id="btn-group-date" onclick="setGrouping('date')" class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-indigo-500/30 text-white">
            <i data-lucide="calendar" class="w-4 h-4"></i> Date
          </button>
          <button id="btn-group-subject" onclick="setGrouping('subject')" class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400">
            <i data-lucide="layout-grid" class="w-4 h-4"></i> Subject
          </button>
        </div>
      </div>

    </div>

    <!-- CLASSES DYNAMIC CONTAINER -->
    <div id="classes-timeline-container" class="space-y-10 mb-20">
      <!-- Injected Dynamically by JavaScript -->
    </div>

  </div>

  <!-- MODAL: ADD / EDIT CLASS RECORD -->
  <div id="record-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden animate-fade-in">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeModal()"></div>
    
    <!-- Dialog Panel -->
    <div class="relative bg-slate-900 border border-white/15 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden z-10">
      <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-950/55">
        <h2 id="modal-title" class="text-xl font-extrabold text-white">Add Class Record</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-white transition-colors">
          <i data-lucide="x-circle" class="w-6 h-6"></i>
        </button>
      </div>

      <form id="record-form" onsubmit="saveRecord(event)" class="p-6 space-y-6">
        <input type="hidden" id="edit-id" value="">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <!-- Subject -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Subject</label>
            <input 
              required type="text" id="form-subject"
              placeholder="e.g., Physics"
              class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600"
            />
          </div>

          <!-- Date -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Date</label>
            <input 
              required type="date" id="form-date"
              class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all [color-scheme:dark]"
            />
          </div>

          <!-- Lecture Name -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-slate-300 mb-2">Lecture Name / Chapter</label>
            <input 
              required type="text" id="form-lecture-name"
              placeholder="e.g., Revision and Doubt Class"
              class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600"
            />
          </div>

          <!-- Topic Description -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-slate-300 mb-2">Topic Overview</label>
            <input 
              type="text" id="form-topic"
              placeholder="e.g., Kinematics, Calculus Fundamentals"
              class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600"
            />
          </div>

          <!-- Start Time -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Start Time</label>
            <input 
              required type="text" id="form-time-start"
              placeholder="e.g., 04:30 PM"
              class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600"
            />
          </div>

          <!-- End Time -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">End Time</label>
            <input 
              required type="text" id="form-time-end"
              placeholder="e.g., 05:45 PM"
              class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600"
            />
          </div>

          <!-- Status Selector -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-slate-300 mb-2">Attendance Status</label>
            <div class="grid grid-cols-3 gap-3">
              <label id="lbl-status-attended" onclick="selectFormStatus('Attended')" class="cursor-pointer border border-white/10 bg-slate-950 rounded-xl py-3 text-center font-bold text-slate-400 transition-all">
                Attended
              </label>
              <label id="lbl-status-missed" onclick="selectFormStatus('Missed')" class="cursor-pointer border border-white/10 bg-slate-950 rounded-xl py-3 text-center font-bold text-slate-400 transition-all">
                Missed
              </label>
              <label id="lbl-status-partial" onclick="selectFormStatus('Partial')" class="cursor-pointer border border-white/10 bg-slate-950 rounded-xl py-3 text-center font-bold text-slate-400 transition-all">
                Partial
              </label>
            </div>
            <input type="hidden" id="form-status" value="Attended">
          </div>

          <!-- Conditional: Topics Missed for Partial status -->
          <div id="partial-topics-container" class="md:col-span-2 hidden animate-in fade-in slide-in-from-top-2 duration-200">
            <label class="block text-sm font-medium text-amber-400 mb-2 flex items-center gap-2">
              <i data-lucide="alert-circle" class="w-4 h-4"></i> Topics Missed / To Revisit
            </label>
            <textarea 
              id="form-missed-topics"
              placeholder="Enter details on the topics or sections you missed or need to recap..."
              rows="3"
              class="w-full bg-amber-500/5 border border-amber-500/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all placeholder:text-amber-800/40"
            ></textarea>
          </div>

        </div>

        <!-- Footer Actions -->
        <div class="pt-6 border-t border-white/10 flex justify-end gap-3 mt-4">
          <button 
            type="button" onclick="closeModal()"
            class="px-6 py-2.5 rounded-xl font-semibold text-slate-400 hover:bg-white/5 hover:text-white transition-colors"
          >
            Cancel
          </button>
          <button 
            type="submit"
            class="px-6 py-2.5 rounded-xl font-bold accent-gradient-bg text-slate-950 shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 transition-all hover:scale-[1.02] active:scale-95"
          >
            Save Record
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- CORE JS LOGIC -->
  <script>
    // --- APP DATA ---
    let classes = [
      {
        id: '1',
        date: '2026-05-16',
        subject: 'Maths',
        lectureName: 'Revision And Doubt Class',
        topic: 'Calculus Fundamentals',
        timeStart: '04:30 PM',
        timeEnd: '05:45 PM',
        status: 'Missed',
        missedTopics: ''
      },
      {
        id: '2',
        date: '2026-05-16',
        subject: 'Chemistry',
        lectureName: 'Revision And Doubt Class',
        topic: 'Organic Chemistry Basics',
        timeStart: '06:00 PM',
        timeEnd: '07:15 PM',
        status: 'Attended',
        missedTopics: ''
      },
      {
        id: '3',
        date: '2026-05-16',
        subject: 'Physics',
        lectureName: 'Revision And Doubt Class',
        topic: 'Kinematics',
        timeStart: '07:30 PM',
        timeEnd: '08:45 PM',
        status: 'Missed',
        missedTopics: ''
      },
      {
        id: '4',
        date: '2026-05-15',
        subject: 'Biology',
        lectureName: 'Cellular Biology',
        topic: 'Cell Division',
        timeStart: '10:00 AM',
        timeEnd: '11:30 AM',
        status: 'Partial',
        missedTopics: 'Meiosis phases, Spindle fiber formation'
      },
      {
        id: '5',
        date: '2026-05-12',
        subject: 'Maths',
        lectureName: 'Integration',
        topic: 'Definite Integrals',
        timeStart: '04:30 PM',
        timeEnd: '05:45 PM',
        status: 'Attended',
        missedTopics: ''
      }
    ];

    // Check LocalStorage for existing records
    if(localStorage.getItem('nexus_classes')) {
      try {
        classes = JSON.parse(localStorage.getItem('nexus_classes'));
      } catch (e) {
        console.error("Localstorage parsing error, using default data.");
      }
    }

    // --- STATE MANAGER ---
    let currentTheme = localStorage.getItem('nexus_theme') || 'space';
    let groupBy = 'date'; // 'date' | 'subject'
    let viewMode = 'month'; // 'month' | 'week'
    let currentDate = new Date(2026, 4, 16); // May 16, 2026

    // --- INIT APP ---
    document.addEventListener("DOMContentLoaded", () => {
      setTheme(currentTheme);
      renderApp();
    });

    // --- THEME SWITCHER ---
    function setTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('nexus_theme', theme);
      
      const html = document.documentElement;
      html.className = ''; // Reset class list
      
      if (theme === 'cyberpunk') {
        html.classList.add('dark', 'theme-cyberpunk');
      } else if (theme === 'forest') {
        html.classList.add('dark', 'theme-forest');
      } else if (theme === 'light') {
        html.classList.add('theme-light');
      } else {
        html.classList.add('dark'); // 'space' theme is the default dark
      }
    }

    // --- STATE CHANGER TRIGGERS ---
    function setGrouping(mode) {
      groupBy = mode;
      
      const btnDate = document.getElementById('btn-group-date');
      const btnSub = document.getElementById('btn-group-subject');
      
      if (mode === 'date') {
        btnDate.className = 'flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-indigo-500/30 text-white';
        btnSub.className = 'flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400';
      } else {
        btnSub.className = 'flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-indigo-500/30 text-white';
        btnDate.className = 'flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400';
      }
      renderApp();
    }

    function setViewMode(mode) {
      viewMode = mode;
      
      const btnWeek = document.getElementById('btn-view-week');
      const btnMonth = document.getElementById('btn-view-month');
      
      if (mode === 'week') {
        btnWeek.className = 'px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-white/15 text-white';
        btnMonth.className = 'px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400';
      } else {
        btnMonth.className = 'px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-white/15 text-white';
        btnWeek.className = 'px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400';
      }
      renderApp();
    }

    function adjustDate(direction) {
      if (viewMode === 'month') {
        currentDate.setMonth(currentDate.getMonth() + direction);
      } else {
        currentDate.setDate(currentDate.getDate() + (direction * 7));
      }
      renderApp();
    }

    function syncLocalStorage() {
      localStorage.setItem('nexus_classes', JSON.stringify(classes));
    }

    // --- RENDERING PIPELINE ---
    function renderApp() {
      // 1. Update stats
      const totalMissed = classes.filter(c => c.status === 'Missed').length;
      const totalPartial = classes.filter(c => c.status === 'Partial').length;
      
      document.getElementById('stat-backlogs').textContent = totalMissed + totalPartial;
      document.getElementById('stat-missed').textContent = totalMissed;
      document.getElementById('stat-partial').textContent = totalPartial;

      // 2. Update navigation label
      const dateLabel = document.getElementById('date-label');
      if (viewMode === 'month') {
        dateLabel.textContent = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      } else {
        // Find week boundary
        const startOfWeek = new Date(currentDate);
        dateLabel.textContent = `Week of ${startOfWeek.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
      }

      // 3. Filter classes
      const filtered = classes.filter(c => {
        const classDate = new Date(c.date);
        if (viewMode === 'month') {
          return classDate.getMonth() === currentDate.getMonth() && classDate.getFullYear() === currentDate.getFullYear();
        } else {
          const diff = Math.abs(classDate - currentDate) / (1000 * 60 * 60 * 24);
          return diff <= 3; // Approx 1 week window
        }
      });

      // 4. Group classes
      const groups = {};
      filtered.forEach(c => {
        const key = groupBy === 'date' ? c.date : c.subject;
        if (!groups[key]) groups[key] = [];
        groups[key].push(c);
      });

      // Sort group headers
      const sortedKeys = Object.keys(groups).sort((a, b) => {
        if (groupBy === 'date') return new Date(b) - new Date(a);
        return a.localeCompare(b);
      });

      // 5. Render list layout
      const container = document.getElementById('classes-timeline-container');
      container.innerHTML = '';

      if (sortedKeys.length === 0) {
        container.innerHTML = `
          <div class="text-center py-20 opacity-50">
            <i data-lucide="book-open" class="mx-auto mb-4 w-12 h-12"></i>
            <p class="text-lg">No records found for this timeframe.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      sortedKeys.forEach(groupKey => {
        const groupItems = groups[groupKey];
        
        // Define label
        let titleLabel = groupKey;
        let iconName = 'layout-grid';
        if (groupBy === 'date') {
          const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
          titleLabel = new Date(groupKey).toLocaleDateString('en-US', options);
          iconName = 'calendar';
        }

        const groupSection = document.createElement('div');
        groupSection.className = 'space-y-4';
        
        let headerHtml = `
          <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 border-b border-white/10 pb-3">
            <i data-lucide="${iconName}" class="w-6 h-6 text-indigo-400"></i> ${titleLabel}
            <span class="text-xs font-normal bg-white/10 px-3 py-1 rounded-full ml-2">
              ${groupItems.length} Class${groupItems.length > 1 ? 'es' : ''}
            </span>
          </h2>
        `;

        let cardsHtml = `<div class="grid grid-cols-1 xl:grid-cols-2 gap-4">`;

        groupItems.forEach(item => {
          let statusColorClass = 'text-emerald-400 border-emerald-500/20 bg-emerald-500/10';
          let statusIcon = 'check-circle-2';
          if (item.status === 'Missed') {
            statusColorClass = 'text-rose-400 border-rose-500/20 bg-rose-500/10';
            statusIcon = 'x-circle';
          } else if (item.status === 'Partial') {
            statusColorClass = 'text-amber-400 border-amber-500/20 bg-amber-500/10';
            statusIcon = 'alert-circle';
          }

          let partialDetailsHtml = '';
          if (item.status === 'Partial') {
            partialDetailsHtml = `
              <div class="mt-4 p-3 bg-amber-500/10 border border-amber-500/20 rounded-xl">
                <p class="text-xs font-bold text-amber-500 mb-1 uppercase tracking-wider flex items-center gap-1">
                  <i data-lucide="alert-circle" class="w-4.5 h-4.5"></i> Topics to catch up on:
                </p>
                <p class="text-sm text-amber-200/80 italic">
                  ${item.missedTopics || 'None specified yet. Edit this card to list missed topics.'}
                </p>
              </div>
            `;
          }

          cardsHtml += `
            <div class="group relative glass-card p-5 rounded-2xl flex flex-col md:flex-row gap-5 items-start md:items-center">
              
              <!-- Left: Time / Subject Tag -->
              <div class="flex-shrink-0 flex flex-col gap-2 min-w-[140px]">
                <div class="flex items-center gap-2 opacity-80 font-medium">
                  <i data-lucide="clock" class="w-4 h-4 text-indigo-400"></i>
                  <span class="text-sm">${item.timeStart} - ${item.timeEnd}</span>
                </div>
                <div class="inline-flex max-w-fit items-center px-3 py-1 rounded-md bg-slate-900/60 border border-white/5 text-xs font-semibold tracking-wide text-cyan-300 uppercase">
                  ${item.subject}
                </div>
              </div>

              <!-- Center Details -->
              <div class="flex-grow w-full md:w-auto">
                <h3 class="text-lg font-bold text-white mb-1">${item.lectureName}</h3>
                <p class="opacity-70 text-sm">${item.topic || 'No specific topic listed'}</p>
                ${partialDetailsHtml}
              </div>

              <!-- Right Actions and Badge -->
              <div class="flex md:flex-col items-center md:items-end justify-between w-full md:w-auto gap-4 mt-4 md:mt-0">
                <div class="flex items-center gap-2 px-4 py-2 rounded-full border ${statusColorClass} font-semibold text-sm">
                  <i data-lucide="${statusIcon}" class="w-4.5 h-4.5"></i>
                  <span>Class ${item.status}</span>
                </div>
                
                <!-- Quick Controls -->
                <div class="flex gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity duration-300">
                  <button onclick="openEditModal('${item.id}')" class="p-2 bg-slate-800 hover:bg-indigo-600 rounded-lg text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                  </button>
                  <button onclick="deleteRecord('${item.id}')" class="p-2 bg-slate-800 hover:bg-rose-600 rounded-lg text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>

            </div>
          `;
        });

        cardsHtml += `</div>`;
        groupSection.innerHTML = headerHtml + cardsHtml;
        container.appendChild(groupSection);
      });

      // Fire Lucide to render newly dynamically generated tags
      lucide.createIcons();
    }

    // --- MODAL & FORM OPERATIONS ---
    function openAddModal() {
      document.getElementById('modal-title').textContent = 'Add Class Record';
      document.getElementById('edit-id').value = '';
      
      // Default placeholder values for form
      document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('form-subject').value = '';
      document.getElementById('form-lecture-name').value = '';
      document.getElementById('form-topic').value = '';
      document.getElementById('form-time-start').value = '04:30 PM';
      document.getElementById('form-time-end').value = '05:45 PM';
      document.getElementById('form-missed-topics').value = '';
      
      selectFormStatus('Attended');
      
      const modal = document.getElementById('record-modal');
      modal.classList.remove('hidden');
    }

    function openEditModal(id) {
      const item = classes.find(c => c.id === id);
      if(!item) return;

      document.getElementById('modal-title').textContent = 'Edit Class Record';
      document.getElementById('edit-id').value = id;
      
      document.getElementById('form-date').value = item.date;
      document.getElementById('form-subject').value = item.subject;
      document.getElementById('form-lecture-name').value = item.lectureName;
      document.getElementById('form-topic').value = item.topic;
      document.getElementById('form-time-start').value = item.timeStart;
      document.getElementById('form-time-end').value = item.timeEnd;
      document.getElementById('form-missed-topics').value = item.missedTopics || '';
      
      selectFormStatus(item.status);

      const modal = document.getElementById('record-modal');
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('record-modal').classList.add('hidden');
    }

    function selectFormStatus(status) {
      document.getElementById('form-status').value = status;
      
      const attended = document.getElementById('lbl-status-attended');
      const missed = document.getElementById('lbl-status-missed');
      const partial = document.getElementById('lbl-status-partial');
      const partialBlock = document.getElementById('partial-topics-container');

      // Reset all
      attended.className = "cursor-pointer border border-white/10 bg-slate-950 rounded-xl py-3 text-center font-bold text-slate-400 transition-all";
      missed.className = "cursor-pointer border border-white/10 bg-slate-950 rounded-xl py-3 text-center font-bold text-slate-400 transition-all";
      partial.className = "cursor-pointer border border-white/10 bg-slate-950 rounded-xl py-3 text-center font-bold text-slate-400 transition-all";
      partialBlock.classList.add('hidden');

      // Set Selected style
      if(status === 'Attended') {
        attended.className = "cursor-pointer border border-emerald-500 bg-emerald-500/20 rounded-xl py-3 text-center font-bold text-emerald-400 transition-all";
      } else if (status === 'Missed') {
        missed.className = "cursor-pointer border border-rose-500 bg-rose-500/20 rounded-xl py-3 text-center font-bold text-rose-400 transition-all";
      } else if (status === 'Partial') {
        partial.className = "cursor-pointer border border-amber-500 bg-amber-500/20 rounded-xl py-3 text-center font-bold text-amber-400 transition-all";
        partialBlock.classList.remove('hidden');
      }
    }

    function saveRecord(e) {
      e.preventDefault();
      
      const editId = document.getElementById('edit-id').value;
      const classData = {
        date: document.getElementById('form-date').value,
        subject: document.getElementById('form-subject').value,
        lectureName: document.getElementById('form-lecture-name').value,
        topic: document.getElementById('form-topic').value,
        timeStart: document.getElementById('form-time-start').value,
        timeEnd: document.getElementById('form-time-end').value,
        status: document.getElementById('form-status').value,
        missedTopics: document.getElementById('form-missed-topics').value
      };

      if (editId) {
        // Edit Mode
        classes = classes.map(c => c.id === editId ? { ...classData, id: editId } : c);
      } else {
        // Add Mode
        classes.push({
          ...classData,
          id: Date.now().toString()
        });
      }

      syncLocalStorage();
      closeModal();
      renderApp();
    }

    function deleteRecord(id) {
      if (confirm('Are you sure you want to delete this class record?')) {
        classes = classes.filter(c => c.id !== id);
        syncLocalStorage();
        renderApp();
      }
    }
  </script>
</body>
</html>
