<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Workspace Hub</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #f8fafc 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 2.5rem;
            animation: fadeIn 0.5s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #4f46e5, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* Modern Input Console */
        .task-form {
            display: grid;
            grid-template-columns: 2fr 1fr 1.2fr auto;
            gap: 12px;
            margin-bottom: 2rem;
            background: #f1f5f9;
            padding: 8px;
            border-radius: var(--radius-md);
        }

        input, select, button {
            padding: 12px 16px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            background: var(--card-bg);
            color: var(--text-main);
            transition: var(--transition);
        }

        input:focus, select:focus {
            box-shadow: 0 0 0 3px var(--primary-glow);
            border-color: var(--primary);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button.btn-submit {
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            padding: 12px 24px;
        }

        button.btn-submit:hover {
            background: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        /* Filter Controls */
        .filters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-group select {
            padding: 6px 12px;
            font-size: 0.85rem;
            background: transparent;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        /* Luxury Task Container */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--card-bg);
            transition: var(--transition);
            animation: slideUp 0.4s ease-out both;
        }

        .task-item:hover {
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.02);
        }

        /* Micro-Animated Premium Checkbox */
        .checkbox-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin-right: 16px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .custom-checkmark {
            height: 24px;
            width: 24px;
            background-color: transparent;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-wrapper:hover .custom-checkmark {
            border-color: var(--primary);
        }

        .checkbox-wrapper input:checked ~ .custom-checkmark {
            background-color: var(--success);
            border-color: var(--success);
            transform: scale(1.05);
        }

        .custom-checkmark:after {
            content: "";
            display: none;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .checkbox-wrapper input:checked ~ .custom-checkmark:after {
            display: block;
        }

        /* Info Block & Editable States */
        .task-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }

        .editable-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            border: 1px solid transparent;
            padding: 2px 6px;
            border-radius: 6px;
            width: fit-content;
            transition: var(--transition);
        }

        .editable-text:hover {
            background: #f1f5f9;
            cursor: pointer;
        }

        .editable-text:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            outline: none;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: #eef2ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: capitalize;
            transition: var(--transition);
        }

        .badge:hover {
            background: #e0e7ff;
            cursor: pointer;
        }

        .editable-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            padding: 2px;
        }

        /* Completed Layout Styling */
        .task-item.completed {
            background: #f8fafc;
            border-color: #f1f5f9;
        }

        .task-item.completed .editable-text {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .task-item.completed .badge {
            background: #e2e8f0;
            color: var(--text-muted);
        }

        .delete-btn {
            background: transparent;
            color: #94a3b8;
            border: none;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: #fef2f2;
            border-radius: 8px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 680px) {
            .task-form { grid-template-columns: 1fr; padding: 12px; }
            body { padding: 1rem; }
            .container { padding: 1.5rem; }
            .filters { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Workspace Hub</h1>

        <form class="task-form" id="taskForm">
            <input type="text" id="taskName" placeholder="Create new target..." required>
            <input type="text" id="taskSubject" placeholder="Subject / Track" required>
            <input type="date" id="taskDate" required>
            <button type="submit" class="btn-submit">Launch</button>
        </form>

        <div class="filters">
            <div class="filter-group">
                <label for="statusFilter">Status</label>
                <select id="statusFilter">
                    <option value="all">All Targets</option>
                    <option value="pending">Pending Only</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="subjectFilter">Track</label>
                <select id="subjectFilter">
                    <option value="all">All Subjects</option>
                </select>
            </div>
        </div>

        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        // Default luxury dummy data so the app doesn't load empty
        let defaultTasks = [
            { id: 1, name: "Click here directly to edit this title live", subject: "Design", date: "2026-07-10", completed: false },
            { id: 2, name: "Review structural system layouts", subject: "Engineering", date: "2026-07-15", completed: true }
        ];

        let tasks = JSON.parse(localStorage.getItem('lux_tasks')) || defaultTasks;

        const taskForm = document.getElementById('taskForm');
        const taskList = document.getElementById('taskList');
        const statusFilter = document.getElementById('statusFilter');
        const subjectFilter = document.getElementById('subjectFilter');

        function init() {
            document.getElementById('taskDate').valueAsDate = new Date();
            updateSubjectDropdown();
            renderTasks();
        }

        taskForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newTask = {
                id: Date.now(),
                name: document.getElementById('taskName').value,
                subject: document.getElementById('taskSubject').value,
                date: document.getElementById('taskDate').value,
                completed: false
            };

            tasks.push(newTask);
            saveData();
            taskForm.reset();
            document.getElementById('taskDate').valueAsDate = new Date();
            updateSubjectDropdown();
            renderTasks();
        });

        function toggleTask(id) {
            tasks = tasks.map(task => 
                task.id === id ? { ...task, completed: !task.completed } : task
            );
            saveData();
            setTimeout(renderTasks, 200); 
        }

        function updateTaskField(id, field, value) {
            tasks = tasks.map(task => {
                if (task.id === id) {
                    let updatedValue = value.trim() || task[field];
                    return { ...task, [field]: updatedValue };
                }
                return task;
            });
            saveData();
            if (field === 'subject') {
                updateSubjectDropdown();
            }
        }

        function deleteTask(id) {
            const itemElement = document.getElementById(`item-${id}`);
            if(itemElement) {
                itemElement.style.opacity = '0';
                itemElement.style.transform = 'translateX(30px)';
            }
            
            setTimeout(() => {
                tasks = tasks.filter(task => task.id !== id);
                saveData();
                updateSubjectDropdown();
                renderTasks();
            }, 250);
        }

        function updateSubjectDropdown() {
            const currentSelected = subjectFilter.value;
            const subjects = [...new Set(tasks.map(task => task.subject.toLowerCase()))];
            
            subjectFilter.innerHTML = '<option value="all">All Subjects</option>';
            subjects.forEach(subject => {
                const option = document.createElement('option');
                option.value = subject;
                option.textContent = subject;
                subjectFilter.appendChild(option);
            });

            if (subjects.includes(currentSelected)) {
                subjectFilter.value = currentSelected;
            }
        }

        function renderTasks() {
            const currentStatus = statusFilter.value;
            const currentSubject = subjectFilter.value;

            let filteredTasks = tasks.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (currentStatus === 'completed') filteredTasks = filteredTasks.filter(t => t.completed);
            if (currentStatus === 'pending') filteredTasks = filteredTasks.filter(t => !t.completed);
            if (currentSubject !== 'all') filteredTasks = filteredTasks.filter(t => t.subject.toLowerCase() === currentSubject);

            taskList.innerHTML = '';
            
            filteredTasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                li.id = `item-${task.id}`;
                li.style.animationDelay = `${index * 0.04}s`;
                
                li.innerHTML = `
                    <div class="checkbox-wrapper">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                        <span class="custom-checkmark" onclick="this.previousElementSibling.click()"></span>
                    </div>
                    <div class="task-info">
                        <div class="editable-text" contenteditable="true" onblur="updateTaskField(${task.id}, 'name', this.innerText)" onkeydown="if(event.key === 'Enter'){event.preventDefault(); this.blur();}">${task.name}</div>
                        <div class="task-meta">
                            <span class="badge" contenteditable="true" onblur="updateTaskField(${task.id}, 'subject', this.innerText)" onkeydown="if(event.key === 'Enter'){event.preventDefault(); this.blur();}">${task.subject}</span>
                            <input type="date" class="editable-date" value="${task.date}" onchange="updateTaskField(${task.id}, 'date', this.value)">
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Remove</button>
                `;
                taskList.appendChild(li);
            });
        }

        statusFilter.addEventListener('change', renderTasks);
        subjectFilter.addEventListener('change', renderTasks);

        function saveData() {
            localStorage.setItem('lux_tasks', JSON.stringify(tasks));
        }

        init();
    </script>
</body>
</html>
