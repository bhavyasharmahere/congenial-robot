<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate JEE Roadmap Tracker</title>
    <style>
        /* Theme Variables */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --border-color: #e2e8f0;
            --acc-bg: #f1f5f9;
            
            --sub-phy-bg: #fee2e2; --sub-phy-text: #991b1b;
            --sub-che-bg: #fef9c3; --sub-che-text: #854d0e;
            --sub-mat-bg: #e0f2fe; --sub-mat-text: #0369a1;
        }

        [data-theme="dim"] {
            --bg-color: #1e293b;
            --card-bg: #334155;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --border-color: #475569;
            --acc-bg: #1e293b;
            
            --sub-phy-bg: #7f1d1d; --sub-phy-text: #fecaca;
            --sub-che-bg: #713f12; --sub-che-text: #fef08a;
            --sub-mat-bg: #0c4a6e; --sub-mat-text: #bae6fd;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --acc-bg: #000000;
            
            --sub-phy-bg: #450a0a; --sub-phy-text: #fca5a5;
            --sub-che-bg: #422006; --sub-che-text: #fde047;
            --sub-mat-bg: #082f49; --sub-mat-text: #7dd3fc;
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Layout Grid for Sidebar & Content */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .container { min-width: 0; }

        /* Header & Theme Controls */
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .title-block h1 { margin: 0 0 5px 0; color: var(--primary); }
        .title-block p { margin: 0; color: var(--text-muted); font-weight: 500;}

        .theme-controls {
            display: flex; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden;
        }
        .theme-btn {
            background: none; border: none; padding: 10px 15px;
            cursor: pointer; color: var(--text-main); font-weight: 600;
        }
        .theme-btn.active { background: var(--primary); color: white; }

        /* Master Dashboard */
        .dashboard {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        .progress-container {
            background-color: var(--border-color); border-radius: 50px;
            height: 28px; width: 100%; position: relative; overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #22c55e, #10b981);
            height: 100%; width: 0%; transition: width 0.5s ease-out;
        }
        .progress-text {
            position: absolute; width: 100%; text-align: center;
            top: 4px; font-weight: bold; font-size: 0.95rem;
            color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        /* Sidebar Panels */
        .sidebar {
            position: sticky; top: 20px; height: max-content;
            display: flex; flex-direction: column; gap: 20px;
        }
        .side-panel {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px;
        }
        .side-panel h3 { margin: 0 0 15px 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        
        /* Vertical Progress Meter Style */
        .vertical-bars { display: flex; justify-content: space-around; align-items: flex-end; height: 160px; padding-top: 10px; }
        .v-bar-wrapper { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; width: 50px; }
        .v-bar-container { background: var(--acc-bg); border: 1px solid var(--border-color); border-radius: 8px; width: 24px; height: 120px; position: relative; overflow: hidden; }
        .v-bar-fill { position: absolute; bottom: 0; width: 100%; height: 0%; transition: height 0.4s ease; }
        .v-bar-phy { background: #ef4444; }
        .v-bar-che { background: #eab308; }
        .v-bar-mat { background: #0ea5e9; }
        .v-label { font-size: 0.75rem; font-weight: bold; margin-top: 8px; color: var(--text-muted); }

        /* Filters */
        .filter-section {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px 20px; margin-bottom: 25px;
        }
        .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .filter-row:last-child { margin-bottom: 0; }
        .filter-label { font-weight: bold; min-width: 80px; color: var(--text-muted); }
        .filter-btn {
            background: var(--acc-bg); border: 1px solid var(--border-color);
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            color: var(--text-main); font-weight: 600; white-space: nowrap;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Chapter Cards */
        .phase-title { font-size: 1.4rem; margin-top: 30px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid var(--border-color); }
        .chapter-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
        
        .chapter-header {
            display: grid; grid-template-columns: 100px 100px 1fr auto; align-items: center; padding: 15px; cursor: pointer; gap: 15px;
        }
        .chapter-header:hover { background: var(--acc-bg); }

        .subject-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-align: center; }
        .phy-badge { background: var(--sub-phy-bg); color: var(--sub-phy-text); }
        .che-badge { background: var(--sub-che-bg); color: var(--sub-che-text); }
        .mat-badge { background: var(--sub-mat-bg); color: var(--sub-mat-text); }

        .chapter-title { font-weight: 600; font-size: 1rem; }
        
        /* Interactive Control Layout groups */
        .control-block { display: flex; gap: 15px; align-items: center; }
        .status-group { display: flex; gap: 4px; }
        
        .status-btn {
            padding: 6px 10px; border: 1px solid var(--border-color);
            border-radius: 6px; background: var(--card-bg);
            color: var(--text-muted); font-weight: 600; font-size: 0.8rem;
            cursor: pointer; transition: all 0.2s;
        }
        
        /* Highlight States */
        .btn-red.active { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
        .btn-yellow.active { background: #fef9c3; color: #d97706; border-color: #fde047; }
        .btn-green.active { background: #dcfce7; color: #16a34a; border-color: #86efac; }
        
        .btn-mode { padding: 6px 10px; font-size: 0.75rem; border-radius: 20px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-muted); cursor: pointer; font-weight: bold; }
        .btn-mode.active-mode { background: var(--primary); color: white; border-color: var(--primary); }

        [data-theme="dim"] .btn-red.active, [data-theme="dark"] .btn-red.active { background: #7f1d1d; color: #fca5a5; border-color: #dc2626; }
        [data-theme="dim"] .btn-yellow.active, [data-theme="dark"] .btn-yellow.active { background: #713f12; color: #fde047; border-color: #d97706; }
        [data-theme="dim"] .btn-green.active, [data-theme="dark"] .btn-green.active { background: #14532d; color: #86efac; border-color: #16a34a; }

        /* Expandable Content */
        .chapter-details { display: none; padding: 15px; background: var(--acc-bg); border-top: 1px solid var(--border-color); font-size: 0.95rem; line-height: 1.5; }
        .chapter-details.open { display: block; }
        .detail-label { font-weight: 700; color: var(--primary); margin-bottom: 5px; display: block;}

        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { position: relative; top: 0; display: grid; grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 768px) {
            .chapter-header { grid-template-columns: 1fr; gap: 10px; }
            .control-block { flex-direction: column; align-items: flex-start; gap: 8px; }
            .sidebar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <div class="header-flex">
            <div class="title-block">
                <h1>JEE 2026 Master Framework</h1>
                <p>Allen (Science) + RS Aggarwal (Math) Dynamic Hub</p>
            </div>
            <div class="theme-controls">
                <button class="theme-btn active" onclick="setTheme('light')" id="btn-light">Light</button>
                <button class="theme-btn" onclick="setTheme('dim')" id="btn-dim">Dim</button>
                <button class="theme-btn" onclick="setTheme('dark')" id="btn-dark">Dark</button>
            </div>
        </div>

        <div class="dashboard">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <h3 style="margin:0;">Syllabus Mastery</h3>
                <span id="statsText" style="font-weight: bold; color: var(--text-muted);">0/0</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0% Complete</div>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-row">
                <span class="filter-label">Subject:</span>
                <button class="filter-btn active" onclick="setSubFilter('All')" id="sub-All">All Subjects</button>
                <button class="filter-btn" onclick="setSubFilter('Physics')" id="sub-Physics">Physics</button>
                <button class="filter-btn" onclick="setSubFilter('Chemistry')" id="sub-Chemistry">Chemistry</button>
                <button class="filter-btn" onclick="setSubFilter('Maths')" id="sub-Maths">Maths</button>
            </div>
            <div class="filter-row">
                <span class="filter-label">Timeline:</span>
                <button class="filter-btn active" onclick="setPhaseFilter('All')" id="phase-All">Full Roadmap</button>
                <button class="filter-btn" onclick="setPhaseFilter(1)" id="phase-1">Phase 1</button>
                <button class="filter-btn" onclick="setPhaseFilter(2)" id="phase-2">Phase 2</button>
                <button class="filter-btn" onclick="setPhaseFilter(3)" id="phase-3">Phase 3</button>
                <button class="filter-btn" onclick="setPhaseFilter(4)" id="phase-4">Phase 4</button>
                <button class="filter-btn" onclick="setPhaseFilter(5)" id="phase-5">Phase 5</button>
            </div>
        </div>

        <div id="tracker-container"></div>
    </div>

    <div class="sidebar">
        <div class="side-panel">
            <h3>Subject Progress (Mastered)</h3>
            <div class="vertical-bars">
                <div class="v-bar-wrapper">
                    <div class="v-bar-container"><div class="v-bar-fill v-bar-phy" id="v-bar-phy"></div></div>
                    <span class="v-label">PHY</span>
                </div>
                <div class="v-bar-wrapper">
                    <div class="v-bar-container"><div class="v-bar-fill v-bar-che" id="v-bar-che"></div></div>
                    <span class="v-label">CHEM</span>
                </div>
                <div class="v-bar-wrapper">
                    <div class="v-bar-container"><div class="v-bar-fill v-bar-mat" id="v-bar-mat"></div></div>
                    <span class="v-label">MATH</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const database = [
        // PHASE 1
        { id: 1, phase: 1, phaseName: "Phase 1: Foundations & Kinematics (June - July)", subject: "Physics", name: "Units & Dimensions, Basic Math & Vectors", desc: "Core tools for all of physics. Master vector resolution and dimensional analysis." },
        { id: 2, phase: 1, phaseName: "Phase 1: Foundations & Kinematics (June - July)", subject: "Physics", name: "Kinematics", desc: "Covers 1D & 2D Motion (Projectile/Relative). High practice required." },
        { id: 3, phase: 1, phaseName: "Phase 1: Foundations & Kinematics (June - July)", subject: "Physics", name: "Newton's Laws of Motion & Friction", desc: "The bedrock of mechanics. Focus heavily on Free Body Diagrams (FBDs)." },

        { id: 8, phase: 1, phaseName: "Phase 1: Foundations & Kinematics (June - July)", subject: "Chemistry", name: "States Of Matter", desc: "Focus on ideal gas laws, real gas equations, and compressibility factor." },
        { id: 9, phase: 1, phaseName: "Phase 1: Foundations & Kinematics (June - July)", subject: "Maths", name: "Sets, Relations & Functions", desc: "RS Agg Chapters 1,2,3. Do not skip; forms the basis of entire Calculus." },
        { id: 10, phase: 1, phaseName: "Phase 1: Foundations & Kinematics (June - July)", subject: "Maths", name: "Logarithms", desc: "RS Agg Chapter 31. Crucial manipulation tool for algebra and calculus." },
        { id: 11, phase: 1, phaseName: "Phase 1: Foundations & Kinematics (June - July)", subject: "Maths", name: "Complex Numbers & Quadratic Eq.", desc: "RS Agg Chapter 4. High weightage. Focus on roots of unity and Argand plane." },

        // PHASE 2
        { id: 12, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Physics", name: "Circular Motion", desc: "Link kinematics with forces. Focus on banking of roads and vertical circles." },
        { id: 13, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Physics", name: "Work, Energy And Power", desc: "Work-Energy theorem is a cheat code for solving tough NLM problems." },
        { id: 14, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Physics", name: "Center Of Mass, Momentum And Collision", desc: "Momentum conservation and coefficient of restitution are high yield." },
        { id: 15, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Chemistry", name: "Thermodynamics 1 & 2", desc: "First and Second Laws, Entropy, Gibbs Free Energy." },
        { id: 16, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Chemistry", name: "Thermochemistry", desc: "Hess's Law and Enthalpy of reactions. Very calculative." },
        { id: 17, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Maths", name: "Linear Inequalities (1 & 2 Variables)", desc: "RS Agg Chapters 5 & 6. Essential for finding domains and ranges." },
        { id: 18, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Maths", name: "Permutations & Combinations", desc: "RS Agg Chapters 7 & 8. Requires pure logic, very little formula application." },
        { id: 19, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Maths", name: "Binomial Theorem", desc: "RS Agg Chapter 9. Focus on general terms and finding coefficients." },
        { id: 20, phase: 2, phaseName: "Phase 2: Core Mechanics & Algebra (August)", subject: "Maths", name: "Progressions (AP, GP, Special Series)", desc: "RS Agg Chapters 10,11,12. High scoring, heavily linked to other chapters." },

        // PHASE 3
        { id: 21, phase: 3, phaseName: "Phase 3: Advanced Mechanics & Equilibriums (September)", subject: "Physics", name: "Rotational Dynamics", desc: "The hardest Class 11 physics chapter. Focus on Moment of Inertia, Torque, and Rolling." },
        { id: 22, phase: 3, phaseName: "Phase 3: Advanced Mechanics & Equilibriums (September)", subject: "Physics", name: "Gravitation", desc: "Similar to Electrostatics. High weightage, relatively easy." },
        { id: 23, phase: 3, phaseName: "Phase 3: Advanced Mechanics & Equilibriums (September)", subject: "Chemistry", name: "Chemical Equilibrium", desc: "Le Chatelier's principle and equilibrium constants (Kp, Kc)." },
        { id: 24, phase: 3, phaseName: "Phase 3: Advanced Mechanics & Equilibriums (September)", subject: "Chemistry", name: "Ionic Equilibrium", desc: "Tough. Master pH calculations, Buffer solutions, and Solubility product." },
        { id: 25, phase: 3, phaseName: "Phase 3: Advanced Mechanics & Equilibriums (September)", subject: "Chemistry", name: "Redox And Equivalent Concept", desc: "Balancing equations and n-factor calculations." },
        { id: 26, phase: 3, phaseName: "Phase 3: Advanced Mechanics & Equilibriums (September)", subject: "Maths", name: "Trigonometry Part 1", desc: "RS Agg Ch 13,14,15 (Angles, Functions, Identities). Heavy formula memorization." },
        { id: 27, phase: 3, phaseName: "Phase 3: Advanced Mechanics & Equilibriums (September)", subject: "Maths", name: "Trigonometry Part 2", desc: "RS Agg Ch 16,17,18 (Eq, Triangles, Graphs). Essential for integration later." },

        // PHASE 4
        { id: 28, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Physics", name: "Fluid Mechanics", desc: "Bernoulli's theorem and surface tension are main targets." },
        { id: 29, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Physics", name: "Elasticity, Heat & Thermodynamics", desc: "Combines solid properties, Calorimetry, Thermal Expansion, and KTG." },
        { id: 30, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Chemistry", name: "IUPAC Nomenclature & Common Names", desc: "Strict rule-based naming. Easy marks if rules are memorized." },
        { id: 31, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Chemistry", name: "Structural Isomerism", desc: "Identify chain, position, and functional isomers." },
        { id: 32, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Chemistry", name: "Geometrical Isomerism & Conformations", desc: "Cis-Trans, E-Z systems, and Newman projections." },
        { id: 33, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Chemistry", name: "Optical Isomerism", desc: "Chirality and R/S configuration. Visualize in 3D." },
        { id: 34, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Maths", name: "Straight Lines", desc: "RS Agg Chapter 19. Start of Coordinate Geometry. Locus problems are key." },
        { id: 35, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Maths", name: "Circle", desc: "RS Agg Chapter 20. Tangents and normal equations are critical." },
        { id: 36, phase: 4, phaseName: "Phase 4: Fluids, Heat & Conics (October)", subject: "Maths", name: "Parabola", desc: "RS Agg Chapter 21. Standard properties and parametric coordinates." },

        // PHASE 5
        { id: 37, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Physics", name: "Simple Harmonic Motion (SHM)", desc: "Pendulums, spring systems, and energy in SHM." },
        { id: 38, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Physics", name: "Waves", desc: "String waves, Sound waves, Organ pipes, and Doppler effect." },
        { id: 39, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Chemistry", name: "Electronic Displacement Effect", desc: "Inductive, Mesomeric, Hyperconjugation (Core GOC)." },
        { id: 40, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Chemistry", name: "Hydrocarbons", desc: "Alkanes, Alkenes, Alkynes, and Benzene reactions." },
        { id: 41, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Maths", name: "Ellipse", desc: "RS Agg Chapter 22." },
        { id: 42, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Maths", name: "Hyperbola", desc: "RS Agg Chapter 23. Conjugate properties." },
        { id: 43, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Maths", name: "Applications of Conic Sections & 3D", desc: "RS Agg Chapters 24 & 25. High scoring block." },
        { id: 44, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Maths", name: "Limits & Differentiation", desc: "RS Agg Chapters 26 & 27. The doorway to Class 12 Calculus." },
        { id: 45, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Maths", name: "Mathematical Reasoning", desc: "RS Agg Chapter 28. Free 4 marks in JEE Main." },
        { id: 46, phase: 5, phaseName: "Phase 5: Oscillations, Waves & Calculus (November)", subject: "Maths", name: "Statistics & Probability", desc: "RS Agg Chapters 29 & 30. Variance, Std Deviation, and Bayes Theorem." }
    ];

    let currentSub = 'All';
    let currentPhase = 'All';
    
    // Core structural storage setup
    let stateEngine = JSON.parse(localStorage.getItem('jee_state_engine')) || {};

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${theme}`).classList.add('active');
        localStorage.setItem('jee2026_theme', theme);
    }

    function initTheme() {
        const saved = localStorage.getItem('jee2026_theme') || 'light';
        setTheme(saved);
    }

    function setSubFilter(sub) {
        currentSub = sub;
        document.querySelectorAll('[id^="sub-"]').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`sub-${sub}`).classList.add('active');
        render();
    }

    function setPhaseFilter(phase) {
        currentPhase = phase;
        document.querySelectorAll('[id^="phase-"]').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`phase-${phase}`).classList.add('active');
        render();
    }

    function toggleExpand(id) {
        const detailsDiv = document.getElementById(`desc-${id}`);
        detailsDiv.classList.toggle('open');
    }

    // Toggle logic for Status buttons (Deselectable)
    function toggleStatus(id, targetStatus, event) {
        event.stopPropagation();
        if (!stateEngine[id]) stateEngine[id] = { status: 'none', delivery: 'none' };
        
        if (stateEngine[id].status === targetStatus) {
            stateEngine[id].status = 'none'; // Deselect back to unstarted
        } else {
            stateEngine[id].status = targetStatus;
        }
        saveAndSync();
    }

    // Toggle logic for Delivery Channel buttons (Deselectable)
    function toggleDelivery(id, targetDelivery, event) {
        event.stopPropagation();
        if (!stateEngine[id]) stateEngine[id] = { status: 'none', delivery: 'none' };
        
        if (stateEngine[id].delivery === targetDelivery) {
            stateEngine[id].delivery = 'none';
        } else {
            stateEngine[id].delivery = targetDelivery;
        }
        saveAndSync();
    }

    function saveAndSync() {
        localStorage.setItem('jee_state_engine', JSON.stringify(stateEngine));
        render();
    }

    function getBadgeClass(sub) {
        if(sub === 'Physics') return 'phy-badge';
        if(sub === 'Chemistry') return 'che-badge';
        if(sub === 'Maths') return 'mat-badge';
        return '';
    }

    function render() {
        const container = document.getElementById('tracker-container');
        container.innerHTML = '';
        
        let filtered = database.filter(ch => {
            let matchSub = currentSub === 'All' || ch.subject === currentSub;
            let matchPhase = currentPhase === 'All' || ch.phase == currentPhase;
            return matchSub && matchPhase;
        });

        const phases = {};
        filtered.forEach(ch => {
            if (!phases[ch.phaseName]) phases[ch.phaseName] = [];
            phases[ch.phaseName].push(ch);
        });

        for (const [phaseTitle, chapters] of Object.entries(phases)) {
            let phaseHtml = `<h2 class="phase-title">${phaseTitle}</h2>`;
            
            chapters.forEach(ch => {
                const config = stateEngine[ch.id] || { status: 'none', delivery: 'none' };
                
                phaseHtml += `
                <div class="chapter-card">
                    <div class="chapter-header" onclick="toggleExpand(${ch.id})">
                        <div class="subject-badge ${getBadgeClass(ch.subject)}">${ch.subject}</div>
                        <div class="control-block">
                            <button class="btn-mode ${config.delivery === 'online' ? 'active-mode' : ''}" onclick="toggleDelivery(${ch.id}, 'online', event)">🌐 Online</button>
                            <button class="btn-mode ${config.delivery === 'offline' ? 'active-mode' : ''}" onclick="toggleDelivery(${ch.id}, 'offline', event)">🏫 Offline</button>
                        </div>
                        <div class="chapter-title">${ch.name}</div>
                        <div class="status-group">
                            <button class="status-btn btn-red ${config.status === 'red' ? 'active' : ''}" onclick="toggleStatus(${ch.id}, 'red', event)">🔴 Theory</button>
                            <button class="status-btn btn-yellow ${config.status === 'yellow' ? 'active' : ''}" onclick="toggleStatus(${ch.id}, 'yellow', event)">🟡 Practice</button>
                            <button class="status-btn btn-green ${config.status === 'green' ? 'active' : ''}" onclick="toggleStatus(${ch.id}, 'green', event)">🟢 Mastered</button>
                        </div>
                    </div>
                    <div class="chapter-details" id="desc-${ch.id}">
                        <span class="detail-label">Importance & Context:</span>
                        ${ch.desc}
                    </div>
                </div>`;
            });
            container.innerHTML += phaseHtml;
        }
        
        updateMetrics();
    }

    function updateMetrics() {
        let grandTotal = database.length;
        let grandGreen = 0;

        let subTotals = { Physics: 0, Chemistry: 0, Maths: 0 };
        let subGreens = { Physics: 0, Chemistry: 0, Maths: 0 };

        database.forEach(ch => {
            subTotals[ch.subject]++;
            const config = stateEngine[ch.id] || { status: 'none' };
            if (config.status === 'green') {
                grandGreen++;
                subGreens[ch.subject]++;
            }
        });

        // Top Horizontal bar
        let percent = grandTotal > 0 ? Math.round((grandGreen / grandTotal) * 100) : 0;
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('progressText').innerText = `${percent}% Fully Mastered`;
        document.getElementById('statsText').innerText = `${grandGreen}/${grandTotal} Chapters`;

        // Side Vertical Bars
        document.getElementById('v-bar-phy').style.height = subTotals.Physics > 0 ? (subGreens.Physics / subTotals.Physics) * 100 + '%' : '0%';
        document.getElementById('v-bar-che').style.height = subTotals.Chemistry > 0 ? (subGreens.Chemistry / subTotals.Chemistry) * 100 + '%' : '0%';
        document.getElementById('v-bar-mat').style.height = subTotals.Maths > 0 ? (subGreens.Maths / subTotals.Maths) * 100 + '%' : '0%';
    }

    initTheme();
    render();
</script>

</body>
</html>
